version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: medusa-postgres
    restart: always
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa_password
      POSTGRES_DB: medusa_db
    ports:
      - "5432:5432"
    volumes:
      - medusa-db-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: medusa-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  medusa-db-data:
